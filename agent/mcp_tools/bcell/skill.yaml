# B Cell Analysis Skill Definition
# Single-cell B Cell Repertoire Analysis Service
# Based on Seurat, monocle3, and scRepertoire
# Schema Version: 1.0

# ============================================================
# META - Metadata
# ============================================================
meta:
  name: "bcell"
  version: "1.0"
  summary: "Single-cell B cell repertoire analysis service"
  description: |
    B cell single-cell analysis service providing complete BCR data integration,
    cell type annotation, trajectory analysis, and clonotype analysis capabilities.
    Built on Seurat, monocle3, and scRepertoire.
    Supports naive, memory, plasma, and germinal center B cell analysis.
  tags:
    - b-cell
    - single-cell
    - bcr
    - antibody
    - trajectory
    - clonotype
    - seurat
    - monocle3
  capabilities:
    - "BCR data integration with single-cell data"
    - "Automatic B cell subtype annotation"
    - "Naive/Memory/Plasma/GC B cell classification"
    - "Pseudotime trajectory analysis"
    - "BCR clonotype expansion analysis"
    - "Somatic hypermutation analysis"
    - "Isotype distribution analysis"

# ============================================================
# WORKFLOW - Execution Flow
# ============================================================
workflow:
  description: "Required tool execution sequence"
  steps:
    - step: 1
      name: "Data Integration"
      description: "Integrate BCR data into Seurat object (MUST execute first)"
      tools: ["integrate_bcr_data_complete"]
      is_optional: false
    
    - step: 2
      name: "Analysis & Visualization"
      description: "Run analysis tools (can be executed in parallel)"
      tools: ["bcell_celltype_visualization", "bcell_marker_dotplot", "bcell_trajectory_analysis", "bcell_clonotype_analysis", "bcell_shm_analysis", "bcell_isotype_analysis"]
      is_optional: true

# ============================================================
# TOOLS - Tool List
# ============================================================
tools:

  # ----------------------------------------------------------
  # Phase 1: Visualization Tools
  # ----------------------------------------------------------
  - name: "bcell_celltype_visualization"
    summary: "B cell subtype UMAP visualization"
    description: |
      Visualize B cell subtypes on UMAP with marker-based annotation.
      Annotates naive, memory, plasma, and GC B cells using canonical markers.
      Provides cell type distribution statistics and publication-quality figures.
    
    category: "visualization"
    priority: "core"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Visualizing B cell subtype distribution"
      - "Performing cell type statistics"
      - "Validating cell clustering quality"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Path to Seurat RDS file containing B cell data"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory for analysis results"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Visualization output files"
      schema:
        - name: "celltype_umap.png"
          type: "image"
          description: "Cell type UMAP plot"
        - name: "celltype_pie.png"
          type: "image"
          description: "Cell type pie chart"
        - name: "celltype_stats.csv"
          type: "csv"
          description: "Cell type statistics"

  - name: "bcell_marker_dotplot"
    summary: "B cell marker gene expression dotplot"
    description: |
      Generate DotPlot of B cell marker gene expression across subtypes.
      Supports custom marker gene lists and outputs publication-quality figures.
      Dot size represents expression ratio, color represents expression strength.
    
    category: "visualization"
    priority: "core"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Validating B cell subtype annotation"
      - "Demonstrating marker gene expression patterns"
      - "Comparing gene expression across subtypes"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Path to Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Dotplot output files"
      schema:
        - name: "marker_dotplot.png"
          type: "image"
          description: "Marker gene dotplot"
        - name: "marker_expression.csv"
          type: "csv"
          description: "Marker gene expression data"

  - name: "bcell_binding_visualization"
    summary: "BCR binding prediction visualization"
    description: |
      Visualize BCR binding/antigen reactivity predictions on UMAP.
      Auto-detects binding score columns and generates spatial visualization.
    
    category: "visualization"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Visualizing MetaBCR prediction results"
      - "Analyzing antigen-specific B cell distribution"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file containing binding prediction data"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Binding visualization output files"
      schema:
        - name: "binding_umap.png"
          type: "image"
          description: "Binding prediction UMAP"
        - name: "binding_stats.csv"
          type: "csv"
          description: "Binding statistics"

  # ----------------------------------------------------------
  # Phase 2: Analysis Tools
  # ----------------------------------------------------------
  - name: "bcell_trajectory_analysis"
    summary: "B cell pseudotime trajectory analysis"
    description: |
      Perform B cell pseudotime trajectory analysis using Monocle3.
      Learns differentiation trajectories from naive to plasma cells.
      Configurable root cell type and UMAP visualization with pseudotime coloring.
    
    category: "analysis"
    priority: "high"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Studying B cell differentiation process"
      - "Analyzing cell state transitions"
      - "Identifying differentiation key genes"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Path to Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Trajectory analysis output files"
      schema:
        - name: "trajectory_umap.png"
          type: "image"
          description: "Trajectory UMAP plot"
        - name: "pseudotime_distribution.png"
          type: "image"
          description: "Pseudotime distribution"
        - name: "trajectory_genes.csv"
          type: "csv"
          description: "Trajectory-related genes"

  - name: "bcell_shm_analysis"
    summary: "Somatic hypermutation analysis"
    description: |
      Analyze somatic hypermutation (SHM) rates from AIRR data.
      Calculates SHM rates in V, D, J regions and identifies mutation hotspots.
    
    category: "analysis"
    priority: "high"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing antibody affinity maturation"
      - "Identifying mutation patterns"
      - "Correlating SHM with binding affinity"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file containing AIRR data"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "SHM analysis output files"
      schema:
        - name: "shm_distribution.png"
          type: "image"
          description: "SHM distribution plot"
        - name: "shm_stats.csv"
          type: "csv"
          description: "SHM statistics"

  - name: "bcell_isotype_analysis"
    summary: "BCR isotype distribution analysis"
    description: |
      Analyze BCR isotype (immunoglobulin class) distribution.
      Extracts c_call column and computes isotype proportions across conditions.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing isotype class distribution"
      - "Comparing isotype switching across conditions"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Isotype analysis output files"
      schema:
        - name: "isotype_distribution.png"
          type: "image"
          description: "Isotype distribution plot"
        - name: "isotype_stats.csv"
          type: "csv"
          description: "Isotype statistics"

  - name: "bcell_clonotype_analysis"
    summary: "BCR clonotype expansion analysis"
    description: |
      Analyze BCR clonotype expansion and clonal diversity.
      Calculates clonotype frequencies and identifies expanded clones.
    
    category: "analysis"
    priority: "core"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing B cell clonal expansion"
      - "Comparing clonotype distribution across conditions"
      - "Evaluating BCR diversity"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file containing BCR data"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
      
      - name: "top_n"
        type: "integer"
        required: false
        description: "Number of top clonotypes to display"
        default: 20
    
    returns:
      type: "files"
      description: "Clonotype analysis output files"
      schema:
        - name: "clonotype_frequency.png"
          type: "image"
          description: "Clonotype frequency plot"
        - name: "diversity_stats.csv"
          type: "csv"
          description: "Diversity statistics"

  - name: "bcell_vdj_analysis"
    summary: "V(D)J gene usage analysis"
    description: |
      Analyze V(D)J gene family usage from AIRR data.
      Extracts V/D/J gene calls and computes usage frequencies and heatmaps.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing V/D/J gene family usage"
      - "Comparing gene usage across conditions"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "V(D)J analysis output files"
      schema:
        - name: "vj_usage_heatmap.png"
          type: "image"
          description: "V/J usage heatmap"
        - name: "gene_usage.csv"
          type: "csv"
          description: "Gene usage statistics"

  - name: "bcell_diversity_analysis"
    summary: "BCR repertoire diversity analysis"
    description: |
      Calculate BCR repertoire diversity metrics grouped by a specified column.
      Computes Shannon entropy, Simpson index, and Hill diversity numbers.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Evaluating BCR repertoire diversity"
      - "Comparing diversity across conditions"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
      
      - name: "group_by"
        type: "string"
        required: false
        description: "Grouping variable column name"
        default: "sample"
    
    returns:
      type: "files"
      description: "Diversity analysis output files"
      schema:
        - name: "diversity_indices.png"
          type: "image"
          description: "Diversity indices plot"
        - name: "diversity_stats.csv"
          type: "csv"
          description: "Diversity statistics"

  - name: "bcell_deg_analysis"
    summary: "Differential gene expression analysis"
    description: |
      Perform differential gene expression analysis between two B cell groups.
      Identifies DEGs with statistical significance and fold-change thresholds.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Identifying differentially expressed genes"
      - "Comparing gene expression between conditions"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
      
      - name: "group1"
        type: "string"
        required: true
        description: "First group identifier"
      
      - name: "group2"
        type: "string"
        required: true
        description: "Second group identifier"
    
    returns:
      type: "files"
      description: "DEG analysis output files"
      schema:
        - name: "volcano_plot.png"
          type: "image"
          description: "Volcano plot"
        - name: "deg_results.csv"
          type: "csv"
          description: "DEG results"

  - name: "bcell_gc_analysis"
    summary: "Germinal center dynamics analysis"
    description: |
      Analyze germinal center (GC) dynamics: Dark Zone vs Light Zone.
      Computes zone-specific gene expression and pathway enrichment.
    
    category: "analysis"
    priority: "specialized"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing germinal center B cell dynamics"
      - "Comparing dark zone vs light zone"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "GC analysis output files"
      schema:
        - name: "gc_zones_umap.png"
          type: "image"
          description: "GC zones UMAP"
        - name: "gc_stats.csv"
          type: "csv"
          description: "GC statistics"

  - name: "bcell_plasma_prediction"
    summary: "Plasma cell differentiation prediction"
    description: |
      Predict plasma cell differentiation potential using gene signatures.
      Computes differentiation scores and identifies plasma-biased cells.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Predicting plasma cell differentiation"
      - "Identifying plasma-biased B cells"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Plasma prediction output files"
      schema:
        - name: "plasma_scores_umap.png"
          type: "image"
          description: "Plasma scores UMAP"
        - name: "plasma_prediction.csv"
          type: "csv"
          description: "Plasma prediction results"

  - name: "bcell_maturation_analysis"
    summary: "Affinity maturation analysis"
    description: |
      Analyze affinity maturation by correlating SHM rates with pseudotime.
      Fits regression models to identify maturation-driven mutations.
    
    category: "analysis"
    priority: "specialized"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete", "bcell_trajectory_analysis", "bcell_shm_analysis"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Analyzing antibody affinity maturation"
      - "Correlating SHM with differentiation"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "Maturation analysis output files"
      schema:
        - name: "shm_vs_pseudotime.png"
          type: "image"
          description: "SHM vs pseudotime plot"
        - name: "maturation_stats.csv"
          type: "csv"
          description: "Maturation statistics"

  - name: "bcell_cytotrace_analysis"
    summary: "CytoTRACE differentiation state analysis"
    description: |
      Predict B cell differentiation state using CytoTRACE algorithm.
      CytoTRACE predicts differentiation potential from scRNA-seq data.
    
    category: "analysis"
    priority: "medium"
    execution_order: 2
    
    dependencies:
      prerequisites: ["integrate_bcr_data_complete"]
      recommended: []
      enables: []
    
    when_to_use:
      - "Predicting B cell differentiation state"
      - "Analyzing cellular heterogeneity"
    
    parameters:
      - name: "input_file"
        type: "string"
        required: true
        description: "Seurat RDS file"
        example: "/data/sessions/{session_id}/output/integrated_bcr.rds"
      
      - name: "base_dir"
        type: "string"
        required: true
        description: "Output directory"
        example: "/data/sessions/{session_id}/output"
    
    returns:
      type: "files"
      description: "CytoTRACE analysis output files"
      schema:
        - name: "cytotrace_umap.png"
          type: "image"
          description: "CytoTRACE scores UMAP"
        - name: "cytotrace_results.csv"
          type: "csv"
          description: "CytoTRACE results"

# ============================================================
# FILE_COLUMN_SPECS - Input File Column Specifications
# ============================================================
file_column_specs:
  description: "Column requirements for input files"
  
  rds_requirements:
    description: "Seurat RDS object requirements"
    required_metadata:
      - "Cell barcodes as row names"
      - "UMAP coordinates (umap_1, umap_2)"
    recommended_metadata:
      - "sample"
      - "orig.ident"
  
  airr_requirements:
    description: "AIRR format column requirements for integration"
    required_columns:
      - "cell_id"
      - "v_call"
      - "j_call"
      - "junction"
    recommended_columns:
      - "c_call"
      - "v_identity"

# ============================================================
# CONSTRAINTS - Constraints and Limitations
# ============================================================
constraints:
  celltype_markers:
    description: "B cell subtype marker genes"
    subtypes:
      - name: "Naive_B"
        markers: ["CCR7", "SELL", "TCL1A", "IGHM"]
        description: "Naive B cells"
      - name: "Memory_B"
        markers: ["CD27", "IGHD", "FCRL5"]
        description: "Memory B cells"
      - name: "GC_B"
        markers: ["MEF2C", "CXCR4", "MKI67"]
        description: "Germinal center B cells"
      - name: "Plasma"
        markers: ["SDC1", "XBP1", "JCHAIN"]
        description: "Plasma cells"
  
  limitations:
    - "Requires valid Seurat RDS input file"
    - "Integration tool must be executed first"
    - "SHM analysis requires AIRR data"
    - "Trajectory analysis requires sufficient cell count"

# ============================================================
# EXTERNAL_REFS - External References
# ============================================================
external_refs:
  frameworks:
    - name: "Seurat"
      version: ">=4.0"
      purpose: "Single-cell data analysis"
    - name: "monocle3"
      version: ">=1.0"
      purpose: "Pseudotime trajectory analysis"
    - name: "scRepertoire"
      version: ">=1.0"
      purpose: "BCR data analysis"
  
  dependencies:
    - service: "igblast"
      tools: ["analyze_vdj_batch"]
      description: "V(D)J analysis"
    - service: "metabcr"
      tools: ["metabcr"]
      description: "Antibody-antigen binding prediction"
  
  references:
    - title: "Seurat: Single-cell RNA-seq analysis"
      authors: "Hao et al."
      journal: "Cell"
      year: 2021
      doi: "10.1016/j.cell.2021.04.048"
    
    - title: "scRepertoire: TCR/BCR analysis"
      authors: "Borcherding et al."
      journal: "Nature Communications"
      year: 2020
      doi: "10.1038/s41467-020-15936-2"

