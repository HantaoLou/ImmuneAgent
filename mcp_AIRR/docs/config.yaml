# AIRR Data Commons MCP Server Configuration

# Repository configurations
repositories:
  vdjserver:
    base_url: "https://vdjserver.org/airr/v1"
    name: "VDJServer Community Data Portal"
    timeout: 30
    description: "39 studies, 3,408 repertoires, ~2.5B sequences"
    enabled: true
    priority: 1

  ireceptor:
    base_url: "https://ipa1.ireceptor.org/airr/v1"
    name: "iReceptor Public Archive"
    timeout: 30
    description: "General immunology studies"
    enabled: true
    priority: 2

  covid19:
    base_url: "https://covid19-1.ireceptor.org/airr/v1"
    name: "iReceptor COVID-19 Archive"
    timeout: 30
    description: "COVID-19 specific studies"
    enabled: true
    priority: 3

# Caching configuration
cache:
  enabled: true
  directory: "cache"
  ttl:
    studies: 3600      # 1 hour
    repertoires: 3600  # 1 hour
    queries: 900       # 15 minutes
  auto_cleanup: true
  max_size_mb: 500

# Pagination configuration
pagination:
  default_page_size: 1000
  max_page_size: 10000
  max_concurrent_pages: 3
  chunk_size_large_downloads: 10000

# Performance settings
performance:
  max_concurrent_requests: 3
  request_timeout: 30
  download_timeout: 600
  retry_attempts: 3
  retry_backoff_multiplier: 2
  retry_max_wait: 10

# Output format configuration
output:
  default_format: "airr"  # airr or json
  temp_directory: "/tmp"
  file_prefix: "airr_sequences_"
  include_header: true
  compatible_with_igblast: true

# AIRR format fields (subset)
airr_fields:
  essential:
    - sequence_id
    - sequence
    - v_call
    - d_call
    - j_call
    - junction
    - junction_aa
    - productive

  optional:
    - sequence_aa
    - rev_comp
    - v_score
    - v_identity
    - d_score
    - d_identity
    - j_score
    - j_identity
    - v_cigar
    - d_cigar
    - j_cigar
    - junction_length
    - junction_aa_length
    - v_sequence_start
    - v_sequence_end
    - repertoire_id
    - clone_id
    - cell_id

# Species mapping (common name to NCBI Taxonomy ID)
species:
  human: "NCBITAXON:9606"
  mouse: "NCBITAXON:10090"
  rat: "NCBITAXON:10116"
  rabbit: "NCBITAXON:9986"
  rhesus: "NCBITAXON:9544"
  pig: "NCBITAXON:9823"

# Logging configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null  # Set to path for file logging
  console: true

# Query defaults
query_defaults:
  repertoire_search:
    max_results: 100
    species: "human"
    repository: "all"

  sequence_download:
    max_sequences: 10000
    format: "airr"
    include_non_productive: false

  gene_filtering:
    combination_logic: "AND"
    max_results: 1000

  statistics:
    sample_size: 5000
    metrics:
      - diversity
      - v_usage
      - cdr3_length

# Error handling
error_handling:
  retry_on_timeout: true
  retry_on_rate_limit: true
  failover_enabled: true
  return_partial_results: true

# Security
security:
  validate_inputs: true
  sanitize_file_paths: true
  max_file_size_mb: 1000

# Feature flags
features:
  enable_caching: true
  enable_parallel_queries: true
  enable_streaming_downloads: true
  enable_statistics: true
  enable_query_validation: true
